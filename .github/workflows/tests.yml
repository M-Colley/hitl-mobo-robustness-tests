name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13", "3.14"]
        include:
          # The canonical experiment workflow (run_full_workflow.bat) runs on
          # Windows; test at least one Python version there.
          - os: windows-latest
            python-version: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-eval.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r requirements-eval.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest -q
